<!DOCTYPE html>
<html>
<head>
    <title>AdBoard</title>
</head>
<body>

{% if request.user.is_authenticated %}
   <span>{{request.user.username}}</span>
    <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button type="submit">Logout</button>
    </form>
{% else %}

    <a href="{% url 'login' %}">Login</a>
    <a href="{% url 'register' %}">Register</a>
{% endif %}

<hr>

{% block content %}
{% endblock %}

</body>
</html>
